spring.application.name=buymystuff

spring.datasource.url=jdbc:mysql://localhost:3306/enchere?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8

spring.datasource.username=root
#spring.datasource.password=123456789
 spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Active le debug Spring Security
logging.level.org.springframework.security=DEBUG

# Active le debug JDBC pour voir les queries si n�cessaire
logging.level.org.springframework.jdbc.core=DEBUG

# Pour voir les beans et filters de Spring Security
logging.level.org.springframework.security.web=DEBUG

# Hibernate est optionnel ici
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

spring.profiles.active=jdbc
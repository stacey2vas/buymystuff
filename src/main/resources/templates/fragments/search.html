<div class="w-full mb-8">
  <form id="filterArticle" method="post"
        class="w-full grid  md:grid-cols-7  gap-4 items-end
               bg-[#000036]/90 backdrop-blur-md p-6 rounded-2xl border border-white/20
                text-xs">

    <!-- Rechercher -->
    <div class="md:col-span-2">
      <label for="nomArticle" class="block text-gray-400 mb-2 font-medium">Rechercher</label>
      <input type="text" id="nomArticle" placeholder="Nom de l'article..."
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                    border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Catégories -->
    <div>
      <label for="categorie" class="block text-gray-400 mb-2 font-medium">Catégories</label>
      <select id="categorie" name="categorie"
              class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200">
          <option value="">Tous</option>
          <option th:each="cat : ${categories}"
                  th:value="${cat.id}"
                  th:text="${cat.libelle}"></option>
      </select>
    </div>

    <!-- Prix min -->
    <div>
      <label for="prixMin" class="block text-gray-400 mb-2 font-medium">Prix min</label>
      <input type="number" id="prixMin" name="prixMin" placeholder="0 €" min="0"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Prix max -->
    <div>
      <label for="prixMax" class="block text-gray-400 mb-2 font-medium">Prix max</label>
      <input type="number" id="prixMax" name="prixMax" placeholder="1000 €" min="0"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Date début -->
<!--    <div>-->
<!--      <label for="dateStart" class="block text-gray-400 mb-1 font-medium">Date début</label>-->
<!--      <input type="datetime-local" id="dateStart" name="dateStart" min=""-->
<!--             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20-->
<!--                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]-->
<!--                    transition duration-200"/>-->
<!--    </div>-->

    <!-- Date fin -->
<!--    <div>-->
<!--      <label for="dateEnd" class="block text-gray-400 mb-1 font-medium">Date fin</label>-->
<!--      <input type="datetime-local" id="dateEnd" name="dateEnd"-->
<!--             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20-->
<!--                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]-->
<!--                    transition duration-200"/>-->
<!--    </div>-->
    <div class="md:col-span-2">
      <label class="block text-gray-400 mb-2 font-medium">Statut de l'enchère</label>
      <div class="flex gap-4">
        <button type="button"
                class="toggle-btn px-5 py-2 rounded-xl bg-[#101046]/80 text-white border border-white/20
                   hover:bg-[#4934d3] transition duration-200"
                data-value="encours">
          En cours
        </button>
        <button type="button"
                class="toggle-btn px-5 py-2 rounded-xl bg-[#101046]/80 text-white border border-white/20
                   hover:bg-[#4934d3] transition duration-200"
                data-value="terminee">
          Terminée
        </button>
        <button type="button"
                class="h-[38px] toggle-btn px-5 py-2 rounded-xl bg-[#101046]/80 text-white border border-white/20
                   hover:bg-[#4934d3] transition duration-200"
                data-value="pascommencee">
          Pas commencée
        </button>
      </div>
      <input type="hidden" name="statut" id="statutInput">
    </div>


    <!-- Bouton -->
    <div class="flex md:col-span-6">
      <button type="submit"
              class="w-full md:w-auto px-6 py-2.5 rounded-xl font-semibold
                     bg-[#4934d3] hover:bg-[#3b27a8] text-white
                     shadow-md hover:shadow-lg transition duration-200">
        Filtrer les articles
      </button>
    </div>

  </form>
</div>

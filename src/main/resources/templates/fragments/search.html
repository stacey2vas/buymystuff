<div class="w-full mb-8">
  <form id="filterArticle" method="post"
        class="w-full grid  md:grid-cols-7  gap-4 items-end
               bg-[#000036]/90 backdrop-blur-md p-6 rounded-2xl border border-white/20
                text-xs">

    <!-- Rechercher -->
    <div class="md:col-span-2">
      <label for="nomArticle" class="block text-gray-400 mb-1 font-medium">Rechercher</label>
      <input type="text" id="nomArticle" placeholder="Nom de l'article..."
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                    border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Catégories -->
    <div>
      <label for="categorie" class="block text-gray-400 mb-1 font-medium">Catégories</label>
      <select id="categorie"
              class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                     focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                     transition duration-200">
        <option value="">Tous</option>
        <option value="">Électronique</option>
        <option value="">Mode & Accessoires</option>
        <option value="">Maison & Décoration</option>
        <option value="">Loisirs & Sports</option>
        <option value="">Art & Collections</option>
      </select>
    </div>

    <!-- Prix min -->
    <div>
      <label for="prixMin" class="block text-gray-400 mb-1 font-medium">Prix min</label>
      <input type="number" id="prixMin" name="prixMin" placeholder="0 €" min="0"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Prix max -->
    <div>
      <label for="prixMax" class="block text-gray-400 mb-1 font-medium">Prix max</label>
      <input type="number" id="prixMax" name="prixMax" placeholder="1000 €" min="0"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Date début -->
    <div>
      <label for="dateStart" class="block text-gray-400 mb-1 font-medium">Date début</label>
      <input type="date" id="dateStart" name="dateStart" min=""
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Date fin -->
    <div>
      <label for="dateEnd" class="block text-gray-400 mb-1 font-medium">Date fin</label>
      <input type="date" id="dateEnd" name="dateEnd"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200"/>
    </div>

    <!-- Bouton -->
    <div class="flex md:col-span-6">
      <button type="submit"
              class="w-full md:w-auto px-6 py-2.5 rounded-xl font-semibold
                     bg-[#4934d3] hover:bg-[#3b27a8] text-white
                     shadow-md hover:shadow-lg transition duration-200">
        Filtrer les articles
      </button>
    </div>

  </form>
</div>

<div class="w-full mb-8" xmlns:sec="http://www.w3.org/1999/xhtml">
  <form id="filterArticle" method="post"
        class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-4 items-end
               bg-[#000036]/90 backdrop-blur-md p-4 sm:p-6 rounded-2xl border border-white/20 text-xs">

    <!-- Rechercher -->
    <div class="sm:col-span-2 lg:col-span-2">
      <label class="block text-gray-400 mb-2 font-medium">Rechercher</label>
      <input type="text" id="nomArticle" placeholder="Nom de l'article..."
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                    border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]"/>
    </div>

    <!-- Catégories -->
    <div class="sm:col-span-1">
      <label class="block text-gray-400 mb-2 font-medium">Catégories</label>
      <select id="categorie" name="categorie"
              class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                     focus:ring-2 focus:ring-[#4934d3]">
        <option value="">Tous</option>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.libelle}"></option>
      </select>
    </div>

    <!-- Prix min -->
    <div>
      <label class="block text-gray-400 mb-2 font-medium">Prix min</label>
      <input type="number" id="prixMin" name="prixMin" placeholder="0 €"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20"/>
    </div>

    <!-- Prix max -->
    <div>
      <label class="block text-gray-400 mb-2 font-medium">Prix max</label>
      <input type="number" id="prixMax" name="prixMax" placeholder="1000 €"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20"/>
    </div>

    <!-- Statut -->
    <div class="sm:col-span-2 lg:col-span-2">
      <label class="block text-gray-400 mb-2 font-medium">Statut</label>
      <div class="flex flex-col sm:flex-row gap-4 md:gap-2">
        <button type="button" class="h-[38px] toggle-btn w-full px-3 py-2 rounded-xl bg-[#101046]/80 border border-white/20"
                data-value="encours">En cours</button>

        <button type="button" class="h-[38px] toggle-btn w-full px-3 py-2 rounded-xl bg-[#101046]/80 border border-white/20"
                data-value="terminee">Terminée</button>

        <button type="button" class="h-[38px] toggle-btn w-full px-3 py-2 rounded-xl bg-[#101046]/80 border border-white/20"
                data-value="pascommencee">Pas commencée</button>
      </div>
    </div>

    <!-- Vue (auth seulement) -->
    <div class="sm:col-span-2 lg:col-span-2" sec:authorize="isAuthenticated()">
      <label class="block text-gray-400 mb-2 font-medium">Afficher</label>
      <select name="vue"
              class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
        <option value="toutes">Toutes</option>
        <option value="participation">Participations</option>
        <option value="gagnees">Gagnées</option>
        <option value="mesVentes">Mes ventes</option>
      </select>
    </div>

    <!-- Bouton -->
    <div class="sm:col-span-2 lg:col-span-7">
      <button type="submit"
              class="w-full sm:w-auto px-6 py-2.5 rounded-xl font-semibold
                     bg-[#4934d3] hover:bg-[#3b27a8] text-white transition">
        Filtrer
      </button>
    </div>

  </form>
</div>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-main text-white min-h-screen flex flex-col">

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 bg-header shadow-lg border-b border-[#376996]/50">
    <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <h1 class="text-xl font-bold text-[#6290c8]">MyApp</h1>

        <div class="flex gap-6 items-center">
            <a href="#" class="hover:text-[#6290c8] transition">Accueil</a>
            <a href="#" class="hover:text-[#6290c8] transition">Annonces</a>
            <button class="bg-[#6290c8] hover:bg-[#376996] px-4 py-2 rounded-lg transition">
                Login
            </button>
        </div>

    </nav>
</header>

<!-- MAIN -->
<main class="min-h-[calc(100vh-72px)] mt-[80px] w-full pt-10">
    <div class="max-w-6xl mx-auto px-4">
        <div layout:fragment="content"></div>
    </div>
</main>

<!-- FOOTER -->
<footer class="bg-header border-t border-[#376996] text-center py-4">
    <p class="text-[#829cbc] text-sm">© 2026 - Mon Projet</p>
</footer>

</body>
</html>

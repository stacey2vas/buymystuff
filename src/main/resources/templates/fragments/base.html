<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Projet</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-main text-white flex flex-col min-h-screen">

<!-- HEADER -->
<header class="h-[75px] fixed top-0 left-0 w-full z-50 bg-header  shadow-[0_2px_4px_0_rgba(55,105,150,0.25)]">
    <nav class="w-10/12 mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex gap-1 items-center">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="50" height="50">
                <!-- Cube -->
                <polygon points="16,20 32,12 48,20 32,28" fill="#4934d3"/>
                <polygon points="16,20 16,40 32,48 32,28" fill="#03d6f9"/>
                <polygon points="32,28 32,48 48,40 48,20" fill="#fa8fc1"/>

                <!-- Flèche -->
                <polygon points="32,6 36,14 28,14" fill="#03d6f9"/>
            </svg>

            <h1 class="text-xl font-bold price-color">BuyMyStuff</h1>
        </div>
        <div class="flex gap-6 items-center">
            <a href="#" class="hover:text-[#4934d3] transition">Accueil</a>
            <a href="#" class="hover:text-[#4934d3] transition">Mes annonces</a>
            <button class="bg-btn  px-4 py-2 rounded-lg transition">
                Login
            </button>
        </div>
    </nav>
</header>

<!-- MAIN -->
<main class="flex-1 mt-[95px] w-full flex justify-center">
    <div layout:fragment="content"></div>
</main>
<!-- CONTENT -->
<div th:if="${response != null}"
     th:id="'alert-' + ${response.code}"
     class="flex sm:items-center p-4 mb-4 text-sm rounded-base"
     th:classappend="${response.code == 'ERROR'} ? 'text-red-800 bg-red-100' :
                     (${response.code == 'SUCCESS'} ? 'text-green-800 bg-green-100' :
                     'text-fg-brand-strong bg-brand-softer')"
     role="alert">

    <svg class="w-4 h-4 shrink-0 mt-0.5 md:mt-0"
         xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-width="2"
              d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
    </svg>

    <span class="sr-only" th:text="${response.code}">Info</span>

    <div class="ms-2 text-sm">
        <span th:text="${response.message}">Message par défaut</span>
    </div>

    <button type="button"
            class="ms-auto -mx-1.5 -my-1.5 rounded focus:ring-2 inline-flex items-center justify-center h-8 w-8"
            th:attr="data-dismiss-target='#alert-' + ${response.code}"
            aria-label="Close">
        <span class="sr-only">Close</span>
        <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-width="2"
                  d="M6 18 17.94 6M18 18 6.06 6"/>
        </svg>
    </button>

</div>
<!-- FOOTER -->
<footer class="  text-center py-4 mt-10">
    <p class="font-bold price-color text-sm">© 2026 - BuyMyStuff</p>
</footer>

</body>
</html>

<div th:fragment="cardArticle" th:each="article : ${articles}"
     class="articleCard rounded-lg p-2 flex flex-col gap-4 md:mb-5 shadow-xl border border-card-principal hover:bg-[#000036]
            hover:shadow-2xl hover:translate-y-1 transition duration-300 relative group w-full"
     th:data-timer="${#temporals.format(article.dateFin, 'yyyy-MM-dd''T''HH:mm:ss')}"
     xmlns:sec="http://www.w3.org/1999/xhtml">

    <!-- Image -->
    <a th:href="@{/enchere/{id}(id=${article.id})}"
       class="rounded-xl w-full h-[210px] flex items-center justify-center text-muted border-card-image">
        <img th:src="@{/images/{imageName}(imageName=${article.image})}"
             alt="Image"
             class="object-content w-full h-full rounded-xl"/>
    </a>
    <!-- Description / lien -->
    <div class="text-lg md:text-xl font-semibold text-main min-h-[56px]">
        <a class="hover:text-[#03d6f9]" th:href="@{/enchere/{id}(id=${article.id})}"
           th:text="${article.description}"></a>
    </div>
    <div class="flex flex-col border-t border-dashed border-dash-color pt-3">
        <div class="flex justify-between items-center ">
            <div class="w-1/2 flex flex-col border-r border-dashed border-dash-color p-1">
                <p class="text-sm text-muted">Prix actuel</p>
                <p class="text-lg font-bold text-accent price-color"
                   th:text="${article.prixVente != null && article.prixVente != 0 } ? ${article.prixVente} + ' €' : ${article.prixInitial} + ' €'">
                </p>
            </div>
            <div class="w-1/2 flex flex-col text-right p-1">
                <p class="text-sm text-muted">
                    <span th:if="${T(java.time.LocalDateTime).now().isBefore(article.dateDebut)}">Début dans :</span>
                    <span th:if="${article.dateDebut.isBefore(T(java.time.LocalDateTime).now()) && T(java.time.LocalDateTime).now().isBefore(article.dateFin)}">Termine dans :</span>
                    <span th:if="${article.dateFin.isBefore(T(java.time.LocalDateTime).now())}">Statut de l'enchère :</span>
                </p>
                <p class="timer text-base font-semibold hour-color flex justify-end"
                   th:data-timer-debut="${#temporals.format(article.dateDebut, 'yyyy-MM-dd''T''HH:mm:ss')}"
                    th:data-timer-end="${#temporals.format(article.dateFin, 'yyyy-MM-dd''T''HH:mm:ss')}">
                    <span class="skeleton w-[85px] h-[24px] rounded bg-gray-300 animate-pulse"></span>
                </p>
            </div>
        </div>

        <!-- Enchérir (déjà correct) -->
        <div sec:authorize="isAuthenticated()"
             th:if="${article.utilisateur != null and user != null and user.id != article.utilisateur.id and article.dateDebut != null and article.dateDebut.isBefore(T(java.time.LocalDateTime).now()) and article.dateFin.isAfter(T(java.time.LocalDateTime).now())}"
             class="w-full flex justify-center relative -bottom-8">
            <button class="btnModal bg-btn px-7 py-3 rounded-lg shadow-lg font-semibold transition-all duration-300">
                Enchérir
            </button>
        </div>

        <!-- Non connecté (déjà correct) -->
        <div sec:authorize="isAnonymous()"
             class="w-full flex justify-center relative -bottom-8">
            <a th:href="@{/login}"
               class="bg-btn px-7 py-3 rounded-lg shadow-lg font-semibold transition-all duration-300">
                Connectez-vous pour enchérir
            </a>
        </div>

        <!-- Propriétaire : Modifier la vente si pas commencé -->
        <div sec:authorize="isAuthenticated()"
             th:if="${article.utilisateur != null and user != null and user.id == article.utilisateur.id and article.dateDebut != null and T(java.time.LocalDateTime).now().isBefore(article.dateDebut)}"
             class="w-full flex justify-center relative -bottom-8">
            <a th:href="@{/modify-article/{id}(id=${article.id})}"
               class="bg-btn text-white font-semibold px-7 py-3 rounded-md shadow-md">
                Modifier la vente
            </a>
        </div>

        <!-- Propriétaire : Voir votre enchère si en cours ou terminée -->
        <div sec:authorize="isAuthenticated()"
             th:if="${article.utilisateur != null and user != null and user.id == article.utilisateur.id and article.dateDebut != null and T(java.time.LocalDateTime).now().isAfter(article.dateDebut)}"
             class="w-full flex justify-center relative -bottom-8">
            <a th:href="@{/enchere/{id}(id=${article.id})}"
               class="bg-btn text-white font-semibold px-7 py-3 rounded-md shadow-md">
                Voir votre enchère
            </a>
        </div>

        <!-- Non propriétaire : Voir l'enchère si pas commencée ou terminée -->
        <div sec:authorize="isAuthenticated()"
             th:if="${article.utilisateur != null and user != null and user.id != article.utilisateur.id and (article.dateDebut != null and (T(java.time.LocalDateTime).now().isBefore(article.dateDebut) or T(java.time.LocalDateTime).now().isAfter(article.dateFin)))}"
             class="w-full flex justify-center relative -bottom-8">
            <a th:href="@{/enchere/{id}(id=${article.id})}"
               class="bg-btn text-white font-semibold px-7 py-3 rounded-md shadow-md">
                Voir l'enchère
            </a>
        </div>
    </div>

</div>

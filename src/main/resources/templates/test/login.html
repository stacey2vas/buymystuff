<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<body>
<div layout:fragment="content"
     class="w-10/12 h-auto max-w-md
            bg-card-dark
            border border-card-principal
            p-8 mt-9 rounded-xl
            shadow-[0_05px_30px_rgba(0,0,0,0.9)]">

    <!-- Titre -->
    <h2 class="text-2xl font-bold text-white mb-6 text-center drop-shadow">Connexion</h2>

    <!-- Formulaire -->
    <form class="space-y-4" method="POST" action="/login">

        <!-- Email -->
        <div>
            <label for="email" class="block text-white font-medium mb-1">Email</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-4 py-2 rounded px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                    border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200">
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-white font-medium mb-1">Mot de passe</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-4 py-2 rounded px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                    border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]
                    transition duration-200">
        </div>

        <!-- Submit -->
        <div>
            <button type="submit"
                    class="w-full bg-btn hover:bg-btn hover:bg-btn:hover text-white font-semibold py-2 px-4 rounded-md transition-colors shadow-md transform">
                Se connecter
            </button>
        </div>

    </form>

    <!-- Inscription -->
    <p class="text-gray-400 mt-4 text-center text-sm">
        Pas encore de compte ?
        <a href="/register" class="price-color hover:underline">Inscrivez-vous</a>
    </p>

</div>

</body>
</html>

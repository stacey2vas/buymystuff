<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<div layout:fragment="content"
     class="flex gap-8 w-8/12 justify-center items-start mt-9">

    <!-- Photo de l'utilisateur 1ER block -->

    <div class="w-[45%] flex justify-center flex-col items-center bg-card-dark border border-card-principal p-8 rounded-xl">
        <a href="\update" class="block ml-auto w-fit">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                 stroke="currentColor" class="size-7">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"/>
            </svg>
        </a>
        <div class="w-20 h-20 flex items-center justify-center
                        rounded-full bg-[#03d6f9] text-2xl font-bold">
                <span class="text-[#4934d3]"
                      th:text="${#authentication.principal.username.substring(0,1).toUpperCase()}">
                </span>
        </div>

        <p class="text-white mt-4 font-semibold"
           th:text="${user.pseudo}">
        </p>
        <p><span th:text="${user.email}"></span></p>
        <div class="flex gap-4 mt-4">
            <!-- Bouton deconnexion -->
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button type="submit"
                        class="bg-btn hover:bg-btn text-white font-bold py-2 px-4 rounded">
                    Se déconnecter
                </button>
            </form>
            <!-- Bouton supression-->
            <form th:action="@{/delete-account}" method="post" sec:authorize="isAuthenticated()">
                <button class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                    Supprimer le compte
                </button>
            </form>
        </div>
    </div>


    <!-- ================= Pofil ============ -->

    <div class="w-[60%] flex flex-col gap-8">
        <div class="w-full bg-card-dark border border-card-principal p-8 rounded-xl">
            <!-- Titre -->
            <h2 class="text-2xl font-bold text-white mb-6 text-center drop-shadow">
                Profil de <span th:text="${user.pseudo}"></span>
            </h2>

            <!-- Informations de l'utilisateur -->

            <div class="w-[60%] flex flex-col gap-2">
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Nom :</p>
                    <p th:text="${user.nom}"></p>
                </div>
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Premon :</p>
                    <p th:text="${user.prenom}"></p>
                </div>
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Pseudo :</p>
                    <p th:text="${user.pseudo}"></p>
                </div>
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Telephone :</p>
                    <p th:text="${user.telephone}"></p>
                </div>
            </div>



            <!-- Adresse de l'utilisateur -->

        </div>
        <div class="w-full bg-card-dark border border-card-principal p-8 rounded-xl">
            <h2 class="text-2xl font-bold text-white mb-6 text-center drop-shadow">Adresse</h2>
            <div class="w-[60%] flex flex-col gap-2">
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Rue :</p>
                    <p th:text="${user.adresse.rue}"></p>
                </div>
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Code postal :</p>
                    <p th:text="${user.adresse.codePostal}"></p>
                </div>
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Ville :</p>
                    <p th:text="${user.pseudo}"></p>
                </div>
                <div class="flex">
                    <p class="w-[40%] space-y-3 text-gray-400">Telephone :</p>
                    <p th:text="${user.adresse.ville}"></p>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>

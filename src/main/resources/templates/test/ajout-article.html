<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">

<body>
<div layout:fragment="content"
     class="w-[35%]
            bg-card-dark
            border border-card-principal
            p-8 mt-9 rounded-xl
            shadow-[0_05px_30px_rgba(0,0,0,0.9)]">

    <h2 class="text-2xl font-bold text-white mb-6 text-center drop-shadow">
        Ajouter un article
    </h2>

    <form class="space-y-4"
          method="POST"
          th:action="@{/save-article}"
          th:object="${articleForm}">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Classes communes -->
        <!-- (tu peux les extraire dans un fragment si tu veux aller plus loin) -->

        <div class="flex gap-2">
            <div class="w-1/2">
                <label for="nom" class="block text-white mb-1">Nom de l'article</label>
                <input id="nom" type="text" th:field="*{nomArticle}" required
                       class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                       border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                       focus:border-[#4934d3] transition duration-200">
            </div>

            <div class="w-1/2">
                <label for="categories" class="block text-white mb-1">Catégories</label>
                <select th:field="*{categories}" id="categories" multiple
                        class="choices w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
               border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
               focus:border-[#4934d3] transition duration-200">
                    <option th:each="categorie : ${categories}"
                            th:value="${categorie.id}"
                            th:text="${categorie.libelle}">
                    </option>
                </select>
            </div>
        </div>

        <!-- Image -->
        <div>
            <label class="block text-white font-medium mb-1">Image de l'article</label>
            <input type="file" accept="image/*"
                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                   border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                   focus:border-[#4934d3] transition duration-200">
        </div>

        <!-- Description -->
        <div>
            <label class="block text-white mb-1">Description</label>
            <textarea th:field="*{description}" required
                      class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
                      border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                      focus:border-[#4934d3] transition duration-200"></textarea>
        </div>

        <div class="flex gap-2">
            <div class="w-1/2">
                <label class="block text-white mb-1">Date début</label>
                <input type="datetime-local" th:field="*{dateDebut}" required
                       class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                       border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                       focus:border-[#4934d3] transition duration-200">
            </div>

            <div class="w-1/2">
                <label class="block text-white mb-1">Date fin</label>
                <input type="datetime-local" th:field="*{dateFin}" required
                       class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                       border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                       focus:border-[#4934d3] transition duration-200">
            </div>
        </div>

        <div class="flex gap-2">
            <div class="w-1/2">
                <label class="block text-white mb-1">Prix initial</label>
                <input type="number" th:field="*{prixInitial}" required
                       class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                       border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                       focus:border-[#4934d3] transition duration-200">
            </div>

            <div class="w-1/2">
                <label class="block text-white mb-1">Prix de vente</label>
                <input type="number" th:field="*{prixVente}"
                       class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                       border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
                       focus:border-[#4934d3] transition duration-200">
            </div>
        </div>

        <div class="space-y-3">

            <!-- Checkbox -->
            <div class="flex items-center gap-2">
                <input type="checkbox" id="useMyAddress" checked
                       class="w-4 h-4 accent-[#4934d3] cursor-pointer">
                <label for="useMyAddress" class="text-white">
                    Utiliser votre adresse comme adresse de livraison
                </label>
            </div>

            <!-- Recherche adresse -->
            <div>
                <label class="block text-white mb-1">Rechercher une adresse</label>
                <input type="text" id="searchAddress"
                       placeholder="Ex: 10 rue de Paris..."
                       class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white placeholder-white
               border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3]
               focus:border-[#4934d3] transition duration-200">
            </div>

            <!-- Adresse sélectionnée (résultat API) -->
            <div>
                <label class="block text-white mb-1">Adresse sélectionnée</label>
                <p id="selectedAddress" class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/50 text-gray-300
               border border-white/10" th:text="${adresse.rue + ','+ adresse.codePostal + adresse.ville}"></p>
            </div>
        </div>

        <div>
            <button type="submit"
                    class="w-full bg-btn hover:bg-btn text-white font-semibold py-2 px-4 rounded-md
                    transition-colors shadow-md transform">
                Ajouter l'article
            </button>
        </div>

    </form>
    <script th:src="@{/js/ajout-article.js}" defer></script>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">

<body>
<div layout:fragment="content"
     class="w-10/12 h-auto max-w-md
            bg-card-dark
            border border-card-principal
            p-8 mt-9 rounded-xl
            shadow-[0_05px_30px_rgba(0,0,0,0.9)]">

    <!-- Titre -->
    <h2 class="text-2xl font-bold text-white mb-6 text-center drop-shadow">
        Ajouter un article
    </h2>

    <!-- Formulaire -->
    <form class="space-y-4"
          method="POST"
          th:action="@{/articles/save}"
          th:object="${article}">

        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- Nom -->
        <div>
            <label class="block text-white mb-1">Nom de l'article</label>
            <input type="text" th:field="*{nomArticle}" required
                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                   border border-white/20 focus:ring-2 focus:ring-[#4934d3]">
        </div>

        <!-- Description -->
        <div>
            <label class="block text-white mb-1">Description</label>
            <textarea th:field="*{description}" required
                      class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white
                      border border-white/20 focus:ring-2 focus:ring-[#4934d3]"></textarea>
        </div>

        <!-- Dates -->
        <div>
            <label class="block text-white mb-1">Date début</label>
            <input type="datetime-local" th:field="*{dateDebut}" required
                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
        </div>

        <div>
            <label class="block text-white mb-1">Date fin</label>
            <input type="datetime-local" th:field="*{dateFin}" required
                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
        </div>

        <!-- Prix -->
        <div>
            <label class="block text-white mb-1">Prix initial</label>
            <input type="number" th:field="*{prixInitial}" required
                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
        </div>

        <div>
            <label class="block text-white mb-1">Prix de vente</label>
            <input type="number" th:field="*{prixVente}"
                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
        </div>

        <!-- Utilisateur -->
        <div>
            <label class="block text-white mb-1">Utilisateur</label>
            <select th:field="*{utilisateur}"
                    class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
                <option th:each="u : ${utilisateurs}"
                        th:value="${u.id}"
                        th:text="${u.nom}">
                </option>
            </select>
        </div>

        <!-- Catégories -->
        <div>
            <label class="block text-white mb-1">Catégories</label>
            <select multiple th:field="*{categories}"
                    class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.nom}">
                </option>
            </select>
        </div>

        <!-- Adresse -->
        <div>
            <label class="block text-white mb-1">Adresse</label>
            <select th:field="*{adresseProprietaire}"
                    class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20">
                <option th:each="a : ${adresses}"
                        th:value="${a.id}"
                        th:text="${a.rue + ' ' + a.ville}">
                </option>
            </select>
        </div>

        <!-- Submit -->
        <div>
            <button type="submit"
                    class="w-full bg-btn hover:bg-btn text-white font-semibold py-2 px-4 rounded-md shadow-md">
                Ajouter
            </button>
        </div>

    </form>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<div layout:fragment="content"
     class="flex gap-12 w-8/12 justify-center items-start mt-9">

    <!-- Photo de l'utilisateur 1ER block -->

    <div class="w-[45%] flex justify-center flex-col items-center bg-card-dark border border-card-principal p-8 rounded-xl shadow-[0_5px_30px_rgba(0,0,0,0.9)]">
        <a href="\profile" class="block mr-auto w-fit" title="Retour au profil">
            <svg class="w-5 h-5 text-white-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                 fill="none" viewBox="0 0 8 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M7 1 1.3 6.326a.91.91 0 0 0 0 1.348L7 13"/>
            </svg>
        </a>
        <div class="w-20 h-20 flex items-center justify-center
                        rounded-full bg-[#03d6f9] text-2xl font-bold">
                <span class="text-[#4934d3]"
                      th:text="${#authentication.principal.username.substring(0,1).toUpperCase()}">
                </span>
        </div>

        <p class="text-white mt-4 font-semibold"
           th:text="${user.pseudo}">
        </p>
        <p><span th:text="${user.email}"></span></p>
        <div class="flex gap-4 mt-4">
            <!-- Bouton deconnexion -->
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button type="submit"
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    Se déconnecter
                </button>
            </form>
            <!-- Bouton supression-->
            <form th:action="@{/delete-account}" method="post" sec:authorize="isAuthenticated()">
                <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                    Supprimer le compte
                </button>
            </form>
        </div>
    </div>

    <!-- ================= Pofil ============ -->

    <div class="w-[60%] flex flex-col gap-4">
        <div class="w-full bg-card-dark border border-card-principal p-8 rounded-xl shadow-[0_5px_30px_rgba(0,0,0,0.9)]">
            <h2 class="text-2xl font-bold text-white mb-6 text-center drop-shadow">
                Profil de <span th:text="${user.pseudo}"></span>
            </h2>
            <form method="POST" th:action="@{/process-update}" th:object="${user}" class="space-y-4">

                <!-- Champs uniformes -->
                <div class="flex flex-col items-center gap-2">
                    <label for="nom" class="w-full text-white font-semibold">Nom :</label>
                    <input id="nom" type="text" th:field="*{nom}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <div class="flex flex-col items-center gap-2">
                    <label for="prenom" class="w-full text-white font-semibold">Prénom :</label>
                    <input id="prenom" type="text" th:field="*{prenom}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <div class="flex flex-col items-center gap-2">
                    <label for="pseudo" class="w-full text-white font-semibold">Pseudo :</label>
                    <input id="pseudo" type="text" th:field="*{pseudo}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <div class="flex flex-col items-center gap-2">
                    <label for="email" class="w-full text-white font-semibold">E-mail :</label>
                    <input id="email" type="email" th:field="*{email}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <div class="flex flex-col items-center gap-2">
                    <label for="telephone" class="w-full text-white font-semibold">Téléphone :</label>
                    <input id="telephone" type="text" th:field="*{telephone}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <!-- Adresse -->
                <h2 class="text-2xl font-bold text-white mb-4 text-center drop-shadow">Adresse</h2>

                <div class="flex flex-col items-center gap-2">
                    <label for="rue" class="w-full text-white font-semibold">Rue :</label>
                    <input id="rue" type="text" th:field="*{adresse.rue}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <div class="flex flex-col items-center gap-2">
                    <label for="ville" class="w-full text-white font-semibold">Ville :</label>
                    <input id="ville" type="text" th:field="*{adresse.ville}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <div class="flex flex-col items-center gap-2">
                    <label for="codepostal" class="w-full text-white font-semibold">Code Postal :</label>
                    <input id="codepostal" type="text" th:field="*{adresse.codePostal}"
                           class="w-full px-4 py-2 rounded-xl bg-[#101046]/80 text-gray-400 border border-white/20 focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3]">
                </div>

                <button type="submit"
                        class="w-full mt-4 bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg shadow transition duration-200">
                    Enregistrer les modifications
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<body>
<div layout:fragment="content" class="w-4/5 mx-auto text-white">
    <div class="max-w-6xl mx-auto">

        <!-- 🔲 TOP SECTION -->
        <div class="flex flex-col md:flex-row gap-10">

            <!-- 🖼️ IMAGE -->
            <div class="md:w-1/2">
                <div class="rounded-xl overflow-hidden shadow-xl border border-card-image">
                    <img th:src="@{/images/{imageName}(imageName=${article.image})}"
                         alt="Image du produit"
                         class="w-full h-[400px] object-cover"/>
                </div>
            </div>

            <!-- 💰 INFOS + ENCHÈRE -->
            <div class="md:w-1/2 flex flex-col gap-6">

                <!-- Titre + Catégories -->
                <div class="flex flex-col gap-2">
                    <h1 class="text-3xl font-bold text-main" th:text="${article.description}"></h1>
                    <div class="flex gap-2 mt-1">
                        <span th:each="categorie : ${article.categories}"
                              class="px-2 py-1 bg-blue-600 rounded text-sm cursor-pointer hover:bg-blue-500"
                              th:text="${categorie.libelle}"></span>
                    </div>
                </div>

                <!-- Bloc info vendeur + prix + timer -->
                <div class="flex-1 gap-2 flex flex-col bg-card-principal p-5 rounded-xl shadow-lg border border-card-principal">

                    <!-- Vendeur -->
                    <div class="flex items-center gap-2 mb-3">
                        <h2 class="text-sm text-muted">Produit vendu par :</h2>
                        <span class="font-semibold" th:text="${proprietaire.pseudo}"></span>
                    </div>

                    <!-- Prix -->
                    <div class="flex justify-around items-center mb-4 border-dashed border-dash-color">
                        <!-- Prix initial -->
                        <div class="flex flex-col items-center justify-center w-1/2 border-r border-dashed border-dash-color pr-4">
                            <p class="text-sm text-muted">Prix initial</p>
                            <p class="text-3xl font-bold text-gray-400" th:text="${article.prixInitial} + ' €'"></p>
                        </div>

                        <!-- Prix actuel -->
                        <div class="flex flex-col items-center justify-center w-1/2 pl-4">
                            <p class="text-sm text-muted">Prix actuel</p>
                            <p class="text-4xl font-bold text-accent price-color animate-pulse-on-change"
                               th:text="${article.prixVente} + ' €'"></p>
                        </div>
                    </div>

                    <!-- Timer -->
                    <div class="flex flex-col gap-6 justify-center items-center border-t border-dashed border-dash-color pt-3">
                        <p class="text-muted mr-2">Temps restant avant la fin de l'enchère :</p>
                        <p class="timer text-2xl font-semibold hour-color" id="timer"
                           th:data-timer="${#temporals.format(article.dateFin, 'yyyy-MM-dd''T''HH:mm:ss')}">
                            <span class="skeleton w-[160px] h-[32px] rounded bg-gray-300 animate-pulse"></span>
                        </p>
                    </div>

                    <!-- Formulaire enchère -->
                    <div class="mt-4 w-full flex flex-col items-center justify-center rounded-lg p-4 bg-card-dark border border-card-principal">
                        <form th:action="@{/encherir}" method="post" class="w-full flex gap-3">
                            <input type="hidden" name="articleId" th:value="${article.id}"/>

                            <input id="prixInitial" type="number"
                                   th:min="${article.prixVente}"
                                   required
                                   class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-white border border-white/20
                                            focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition duration-200">
                            <button type="submit"
                                    class="bg-btn px-6 py-3 rounded-lg shadow-lg font-semibold hover:scale-105 transition"
                                    th:disabled="${user.credit < article.prixVente}">
                                Enchérir
                            </button>


                        </form>
                        <!-- Message si pas assez de crédits -->
                        <div th:if="${user.credit < article.prixVente}" class="text-red-400 font-semibold mt-2">
                            Vous n’avez pas assez de crédits pour enchérir sur ce produit.
                        </div>
                        <div th:if="${user.credit > article.prixVente}"  th:text="'enchère minimum : ' + ${article.prixInitial + 5} + ' €'" class="w-full text-sm italic text-muted text-gray-300">
                        </div>


                        <!-- Feedback -->
                        <div th:if="${error}" class="text-red-400 font-semibold mt-2">
                            <p th:text="${error}"></p>
                        </div>

                        <div th:if="${success}" class="text-green-400 font-semibold mt-2">
                            <p th:text="${success}"></p>
                        </div>
                    </div>

                </div>

            </div>
        </div>
        <!-- 📊 HISTORIQUE ENCHÈRES -->
        <div class="mt-14">
            <h2 class="text-xl font-bold mb-4">Historique des enchères</h2>
            <div class="flex flex-col gap-3">
                <!--                <div th:each="enchere, iterStat : ${encheres}"-->
                <!--                     th:classappend="${iterStat.last} ? 'bg-green-900 border-green-500' : 'bg-[#0f0f3d] border-gray-700'"-->
                <!--                     class="flex justify-between items-center p-3 rounded-lg border">-->
                <!--                    <span class="font-medium" th:text="${enchere.utilisateur.username}"></span>-->
                <!--                    <span class="text-accent font-bold" th:text="${enchere.montant} + ' €'"></span>-->
                <!--                </div>-->
            </div>
        </div>

    </div>


    <!-- ⏱️ Script Timer -->
    <script>// Récupère l'élément unique par son ID
    const el = document.getElementById('timer');

    if (el) {
        const end = new Date(el.dataset.timer);

        const interval = setInterval(() => {
            const diff = end - new Date();

            if (diff <= 0) {
                el.textContent = "Terminé";
                clearInterval(interval);
                return;
            }

            const totalSeconds = Math.floor(diff / 1000);
            const d = Math.floor(totalSeconds / 86400); // jours
            const h = Math.floor((totalSeconds % 86400) / 3600); // heures
            const m = Math.floor((totalSeconds % 3600) / 60); // minutes
            const s = totalSeconds % 60; // secondes

            // Supprime le skeleton seulement au moment de la première mise à jour
            const skeleton = el.querySelector('.skeleton');
            if (skeleton) skeleton.remove();

            let timeStr = "";
            if (d > 0) timeStr += `${d}j `;
            timeStr += `${h}h ${m}m ${s}s`;

            el.textContent = timeStr;
        }, 1000);
    }
    </script>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">

<body>

<div layout:fragment="content"
     class="w-11/12 max-w-lg mx-auto mt-12 p-8 bg-card-dark border border-card-principal rounded-2xl shadow-lg">

  <!-- Titre -->
  <h2 class="text-3xl font-bold text-white mb-8 text-center">
    Créer un compte
  </h2>

  <!-- Message d'erreur -->
  <div th:if="${error}" class="text-red-500 text-sm mb-6 text-center">
    <span th:text="${error}"></span>
  </div>

  <!-- Formulaire -->
  <form method="POST" th:action="@{/process-register}" th:object="${utilisateur}" class="space-y-6">

    <!-- INPUT STYLE UNIQUE -->
    <!-- (copier/coller partout pour cohérence) -->

    <!-- Pseudo -->
    <div>
      <label class="block text-gray-300 text-sm mb-2">Pseudo</label>
      <input type="text" th:field="*{pseudo}" required
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
    </div>

    <!-- Nom / Prénom -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-300 text-sm mb-2">Nom</label>
        <input type="text" th:field="*{nom}" required
               class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                      focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
      </div>
      <div>
        <label class="block text-gray-300 text-sm mb-2">Prénom</label>
        <input type="text" th:field="*{prenom}" required
               class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                      focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
      </div>
    </div>

    <!-- Email -->
    <div>
      <label class="block text-gray-300 text-sm mb-2">E-mail</label>
      <input type="email" th:field="*{email}" required
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
    </div>

    <!-- Téléphone -->
    <div>
      <label class="block text-gray-300 text-sm mb-2">Téléphone</label>
      <input type="text" th:field="*{telephone}"
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
    </div>

    <!-- Adresse -->
    <div class="ptborder-white/10 space-y-4">
      <h3 class="text-white font-semibold">Adresse</h3>

      <div>
        <label class="block text-gray-300 text-sm mb-2">Rue</label>
        <input type="text" th:field="*{adresse.rue}" required
               class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                      focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-300 text-sm mb-2">Ville</label>
          <input type="text" th:field="*{adresse.ville}" required
                 class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                        focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
        </div>
        <div>
          <label class="block text-gray-300 text-sm mb-2">Code postal</label>
          <input type="text" th:field="*{adresse.codePostal}" required
                 class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                        focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
        </div>
      </div>
    </div>

    <!-- Mot de passe -->
    <div>
      <label class="block text-gray-300 text-sm mb-2">Mot de passe</label>
      <input type="password" th:field="*{motDePasse}" required
             class="w-full px-4 py-2.5 rounded-xl bg-[#101046]/80 text-gray-300 border border-white/20
                    focus:outline-none focus:ring-2 focus:ring-[#4934d3] focus:border-[#4934d3] transition">
    </div>

    <!-- Bouton -->
    <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
      S'inscrire
    </button>

  </form>

  <!-- Lien connexion -->
  <p class="text-gray-400 mt-6 text-center text-sm">
    Déjà un compte ?
    <a th:href="@{/login}" class="text-blue-400 hover:underline">
      Se connecter
    </a>
  </p>

</div>

</body>
</html>
